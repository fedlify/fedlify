apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fedlify-web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.fedlify.local
      secretName: fedlify-web-tls
  rules:
    - host: app.fedlify.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fedlify-web
                port:
                  name: http
