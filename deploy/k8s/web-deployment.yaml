apiVersion: apps/v1
kind: Deployment
metadata:
  name: fedlify-web
  labels:
    app.kubernetes.io/name: fedlify-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fedlify-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fedlify-web
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "fedlify-web"
        vault.hashicorp.com/agent-inject-secret-env: "secret/data/fedlify/web"
        vault.hashicorp.com/agent-inject-template-env: |
          {{- with secret "secret/data/fedlify/web" -}}
          {{- range $key, $value := .Data.data }}
          export {{ $key }}="{{ $value }}"
          {{- end }}
          {{- end }}
    spec:
      serviceAccountName: fedlify-web
      containers:
        - name: web
          image: harbor.fedlify.local/fedlify/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -f /vault/secrets/env ]; then . /vault/secrets/env; fi
              pnpm --filter @fedlify/web start
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fedlify-web
